server:
    bind:
        host: 0.0.0.0
        port: 5000
    url: https://compute.naturalcapitalalliance.org
    logo: https://compute.naturalcapitalalliance.org/static/img/natcap-alliance-logo-white.png
    mimetype: application/json; charset=UTF-8
    encoding: utf-8
    gzip: false
    languages:
        - en-US
    pretty_print: true
    limits:
        default_items: 20
        max_items: 50
    templates:  # these are absolute paths on the server. ~ or relative paths don't seem to work.
      path: /home/esoth_stanford_edu/invest-compute/invest_processes/templates
      static: /home/esoth_stanford_edu/invest-compute/invest_processes/static
    map:
        url: https://tile.openstreetmap.org/{z}/{x}/{y}.png
        attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap contributors</a>'
    manager:
        name: invest_processes.slurm_manager.SlurmManager
        connection: /tmp/pygeoapi-process-manager.db
        output_dir: /tmp/
    admin: false # enable admin api

logging:
    level: DEBUG

metadata:
    identification:
        title:
            en: InVEST Compute
        description:
            en: run InVEST models in the cloud
        keywords:
            en:
                - geospatial
                - data
                - api
        keywords_type: theme
        terms_of_service: https://github.com/natcap/invest-compute?tab=Apache-2.0-1-ov-file#readme
        url: https://github.com/natcap/invest-compute
    license:
        name: Apache-2.0 license
        url: https://github.com/natcap/invest-compute?tab=Apache-2.0-1-ov-file#readme
    provider:
        name: Natural Capital Alliance
        url: https://naturalcapitalalliance.stanford.edu/
    contact:
        name: Natural Capital Alliance software team
        email: natcap-software@lists.stanford.edu
        role: pointOfContact

resources:
    invest-execute:
        type: process
        processor:
            name: invest_processes.execute.ExecuteProcessor
    invest-validate:
        type: process
        processor:
            name: invest_processes.validate.ValidateProcessor
